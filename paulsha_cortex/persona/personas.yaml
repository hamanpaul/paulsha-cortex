version: 1
enforcement: shadow
roles:
  manager:
    role: manager
    version: "2.0.0"
    summary: orchestrates lifecycle, dispatch, policy/commit/push/PR, merge, fix dispatch, task triage
    allowed_phases: [claim, define, plan, build, verify, review, ship]
    write_paths: ["docs/**", "openspec/**", "lifecycle.yaml", "runtime/handoff/**"]
    allowed_tools: ["coordinator.dispatch", "coordinator.handoff", "git", "gh", "openspec", "python -m unittest"]
    skills: [openspec-archive, policy-commit]
  planner:
    role: planner
    version: "1.0.0"
    summary: defines accepted requirements and produces implementation plans without building or shipping
    allowed_phases: [define, plan]
    write_paths: ["docs/superpowers/specs/**", "docs/superpowers/plans/**", "openspec/changes/**"]
    allowed_tools: ["rg", "edit", "openspec"]
    skills: [brainstorming, openspec-propose, writing-plans, mcu-hw-evidence]
  builder:
    role: builder
    version: "2.0.0"
    summary: implements approved build slices within bounded scope (copilot first, fixers after)
    allowed_phases: [build]
    write_paths: ["paulsha_cortex/**", "tests/**", "openspec/changes/archive/**", "openspec/changes/**", "changelog.d/**", "CHANGELOG.md", "docs/superpowers/plans/**"]
    allowed_tools: ["python -m unittest", "rg", "edit", "git add", "git commit"]
    skills: [worktree-isolation, tdd-red, subagent-build]
  reviewer:
    role: reviewer
    version: "2.0.0"
    summary: reviews artifacts and records verdicts without code edits
    allowed_phases: [verify, review]
    write_paths: ["reports/review/**"]
    allowed_tools: ["python -m unittest", "rg"]
    skills: [code-review, verification, adversarial-review]
