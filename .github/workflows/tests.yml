name: Tests

# Template 骨架：tests/ 尚不存在時整個 job 跳過（新 repo 出生即綠燈）；
# 一旦加入測試套件，pytest 自動成為 PR gate（滿足 policy R-19）。
on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262  # v4.4.0

      - name: Detect test suite
        id: detect
        run: |
          if [ -d tests ] && ls tests/test_*.py tests/*_test.py >/dev/null 2>&1; then
            echo "has_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
            echo "No test suite yet; skipping pytest."
          fi

      - name: Setup Python
        if: steps.detect.outputs.has_tests == 'true'
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install project and test dependencies
        if: steps.detect.outputs.has_tests == 'true'
        run: |
          python -m pip install --upgrade pip pytest
          if [ -f pyproject.toml ]; then python -m pip install -e ".[test]" || python -m pip install -e . || true; fi
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi

      - name: Run test suite
        if: steps.detect.outputs.has_tests == 'true'
        run: python -m pytest tests/ -q

  build:
    runs-on: ubuntu-latest
    needs: pytest
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262  # v4.4.0

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.13"

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check --strict dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1  # v4.6.1
        with:
          name: python-dist
          path: dist/*

  smoke-install:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.13"

      - name: Download distributions
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e  # v4.2.1
        with:
          name: python-dist
          path: dist

      - name: Smoke install wheel
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          cortex --version
          cortex --help > /dev/null
